<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Whack A Mole</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <img src="vit.png" class="vit-logo vit-top" alt="VIT Logo" />

    <!-- LOGIN SCREEN -->
    <div id="loginScreen" class="start-screen">
      <div class="start-content">
        <h1 class="arcade-title">WHACK <span>THE MOLE</span></h1>
        <p class="tagline">Login to track your high scores!</p>

        <div class="menu-area">
          <input type="text" id="usernameInput" placeholder="Username" maxlength="20" />
          <input type="password" id="passwordInput" placeholder="Password" />
          <button id="loginBtn">LOGIN / REGISTER</button>
          <p class="hint">New users will be automatically registered</p>
        </div>
      </div>
    </div>

    <!-- START SCREEN -->
    <div id="startScreen" class="start-screen hidden">
      <div class="start-content">
        <h1 class="arcade-title">WHACK <span>THE MOLE</span></h1>
        <p class="tagline">Welcome, <span id="usernameDisplay"></span>!</p>

        <div class="stats-area">
          <div class="stat-box">
            <div class="stat-label">Your High Score</div>
            <div class="stat-value" id="userHighScore">0</div>
          </div>
          <div class="stat-box">
            <div class="stat-label">Games Played</div>
            <div class="stat-value" id="gamesPlayed">0</div>
          </div>
        </div>

        <div class="menu-area">
          <select id="difficulty">
            <option value="1000">EASY</option>
            <option value="700">MEDIUM</option>
            <option value="400">HARD</option>
          </select>

          <button id="startBtn">START GAME</button>
          <button id="leaderboardBtn" class="secondary-btn">VIEW LEADERBOARD</button>
          <button id="logoutBtn" class="secondary-btn">LOGOUT</button>
        </div>
      </div>
    </div>
    <!-- GAME SCREEN -->
    <div id="gameScreen" class="screen hidden">
      <div class="top-bar">
        Score: <span id="score">0</span> | High Score:
        <span id="highScore">0</span> | Time: <span id="time">30</span>
      </div>

      <div class="grid" id="grid"></div>

      <button type="button" id="backBtn">Back to Menu</button>
    </div>

    <!-- LEADERBOARD SCREEN -->
    <div id="leaderboardScreen" class="start-screen hidden">
      <div class="start-content">
        <h1 class="arcade-title">LEADERBOARD</h1>

        <div class="leaderboard-container">
          <table id="leaderboardTable">
            <thead>
              <tr>
                <th>Rank</th>
                <th>Player</th>
                <th>High Score</th>
                <th>Games</th>
              </tr>
            </thead>
            <tbody id="leaderboardBody">
              <tr><td colspan="4">Loading...</td></tr>
            </tbody>
          </table>
        </div>

        <button id="backToMenuBtn" class="secondary-btn">BACK TO MENU</button>
      </div>
    </div>

    <img src="hammer.png" id="hammer" alt="hammer" />
    <audio id="hitSound" src="hit.mp3"></audio>

    <script src="script.js"></script>
    <!-- Bottom Center Logo -->
    <img src="vit.png" class="vit-logo vit-bottom" alt="VIT Logo" />
  </body>
</html>
